[phases.setup]
nixPkgs = ["php84", "php84Packages.composer"]

[phases.build]
cmds = [
  "php -v",
  "which php",
  "composer install --optimize-autoloader --no-scripts --no-interaction",
  "php artisan key:generate --force",
  "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"